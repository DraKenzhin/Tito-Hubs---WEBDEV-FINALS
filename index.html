<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tito-Hobs | Gunpla Store</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0f0f1a, #000);
    color: #fff;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    background: linear-gradient(180deg, #0a0a0f, #111827);
    border-right: 2px solid #ff2e2e;
    padding: 20px;
}

.sidebar h2 {
    color: #ff2e2e;
    text-align: center;
    margin-bottom: 25px;
}

.sidebar a {
    display: block;
    padding: 12px;
    margin: 10px 0;
    text-decoration: none;
    color: #ccc;
}

.sidebar a:hover {
    color: #ff2e2e;
}

/* MAIN */
.main {
    margin-left: 250px;
    width: calc(100% - 250px);
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 40px;
    background: #111;
}

/* LOGO */
.logo img {
    height: 100px;
}

/* HERO */
.hero {
    height: 60vh;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    overflow: hidden;
    background: rgba(20, 20, 33, 0.8);
    border: 1px solid #333;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

/* ✅ IMAGE FIX */
.card img {
    width: 100%;
    height: 160px;
    object-fit: cover; /* 🔥 fills nicely */
}


.card:hover {
    border-color: #ff2e2e;
}

.card h3 {
    color: #ff2e2e;
    font-size: 14px;
}

/* TIMELINE */
.timeline {
    display: flex;
    gap: 10px;
    padding: 20px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>⚙ TITO-HOBS</h2>
    <a href="#grades">Gunpla Grades</a>
    <a href="#timeline">Timeline</a>
    <a href="#shop">Shop</a>
</div>

<div class="main">

<header>
    <div class="logo">
        <img src="ChatGPT Image May 1, 2026, 08_51_21 PM.png">
    </div>
</header>

<section id="shop">
    <h2 style="padding:20px;">Featured Kits</h2>

    <div class="grid">

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/1/16/HG-RX-78-2-Gundam-%28Beyond-Global%29-1.jpg">
            <h3>HG RX-78-2 (Beyond Global)</h3>
            <p>₱850</p>
        </div>

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/d/d2/RG-Wing-Gundam-1.jpg">
            <h3>RG Wing Gundam</h3>
            <p>₱1,500</p>
        </div>

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/9/94/MG_Barbatos_01.jpg">
            <h3>MG Barbatos</h3>
            <p>₱3,200</p>
        </div>

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/0/03/PG-Unicorn-Gundam-1.jpg">
            <h3>PG Unicorn</h3>
            <p>₱12,000</p>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 Tito-Hobs</p>
</footer>

</div>
</body>
</html>
