<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tito-Hobs | Gunpla Store</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Orbitron', sans-serif;
}

/* BODY */
body {
    background: radial-gradient(circle at top, #0f0f1a, #000);
    color: #fff;
}

/* PAGE */
.page {
    display: flex;
    min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 250px;
    position: fixed;
    height: 100vh;
    background: linear-gradient(180deg, #0a0a0f, #111827);
    border-right: 2px solid #ff2e2e;
    padding: 20px;
    transition: 0.3s ease;
    overflow: hidden;
}

.sidebar.closed {
    width: 0;
    padding: 20px 0;
    border-right: none;
}

/* SIDEBAR CONTENT HIDE WHEN CLOSED */
.sidebar.closed h2,
.sidebar.closed a {
    opacity: 0;
    pointer-events: none;
}

/* SIDEBAR TITLE */
.sidebar h2 {
    color: #ff2e2e;
    text-align: center;
    margin-bottom: 25px;
    transition: 0.2s;
}

/* SIDEBAR LINKS */
.sidebar a {
    display: block;
    padding: 12px;
    margin: 10px 0;
    color: #ccc;
    text-decoration: none;
    transition: 0.2s;
}

.sidebar a:hover {
    color: #ff2e2e;
}

/* MAIN */
.main {
    margin-left: 250px;
    width: calc(100% - 250px);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    transition: 0.3s ease;
}

/* MAIN WHEN SIDEBAR CLOSED */
.main.expanded {
    margin-left: 0;
    width: 100%;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    background: linear-gradient(90deg, #0a0a0f, #1a1a2e);
    border-bottom: 2px solid #ff2e2e;
}

/* TOGGLE BUTTON */
.menu-toggle {
    font-size: 24px;
    background: none;
    border: none;
    color: #ff2e2e;
    cursor: pointer;
}

/* LOGO */
.logo img {
    height: 110px;
}

/* NAV */
nav a {
    margin: 0 12px;
    color: #ccc;
    text-decoration: none;
}

nav a:hover {
    color: #ff2e2e;
}

/* HERO */
.hero {
    height: 70vh;
    position: relative;
    overflow: hidden;
}

.slide {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    opacity: 0;
    animation: fadeSlide 15s infinite;
    transform: scale(1.05);
}

.slide1 {
    background-image: url('Gemini_Generated_Image_6tcck96tcck96tcc.png');
    animation-delay: 0s;
}

.slide2 {
    background-image: url('ChatGPT Image May 1, 2026, 08_38_31 PM.png');
    animation-delay: 5s;
}

.slide3 {
    background-image: url('Gemini_Generated_Image_cva643cva643cva6.png');
    animation-delay: 10s;
}

.hero-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
}

@keyframes fadeSlide {
    0% { opacity: 0; }
    10% { opacity: 1; }
    40% { opacity: 1; }
    50% { opacity: 0; }
    100% { opacity: 0; }
}

/* SECTIONS */
section {
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
}

/* CARD */
.card {
    background: rgba(20, 20, 33, 0.8);
    border: 1px solid #333;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    border-color: #ff2e2e;
    transform: translateY(-6px);
}

.card img {
    width: 100%;
    height: 160px;
    object-fit: contain;
    margin-bottom: 10px;
}

/* BRANDS */
.brands {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.brands div {
    padding: 15px;
    background: #1a1a2e;
    border-left: 4px solid #ff2e2e;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #111;
    border-top: 2px solid #ff2e2e;
    color: #888;
    margin-top: auto;
}

</style>
</head>

<body>

<div class="page">

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
    <h2>⚙ TITO-HOBS</h2>
    <a href="#grades">Gunpla Grades</a>
    <a href="#brands">Brands</a>
    <a href="#shop">Featured Kits</a>
</div>

<!-- MAIN -->
<div class="main" id="main">

<header>
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

    <div class="logo">
        <img src="ChatGPT Image May 1, 2026, 08_51_21 PM.png">
    </div>

    <nav>
        <a href="#shop">Shop</a>
        <a href="#grades">Grades</a>
        <a href="#brands">Brands</a>
    </nav>
</header>

<!-- CONTENT -->
<div class="content">

<!-- HERO -->
<div class="hero">
    <div class="slide slide1"></div>
    <div class="slide slide2"></div>
    <div class="slide slide3"></div>
    <div class="hero-overlay"></div>
</div>

<!-- GRADES -->
<section id="grades">
    <h2>Gunpla Grades</h2>
    <div class="grid">
        <div class="card"><h3>SD</h3></div>
        <div class="card"><h3>EG</h3></div>
        <div class="card"><h3>HG</h3></div>
        <div class="card"><h3>RG</h3></div>
        <div class="card"><h3>MG</h3></div>
        <div class="card"><h3>PG</h3></div>
    </div>
</section>

<!-- BRANDS -->
<section id="brands">
    <h2>Gunpla Brands</h2>
    <div class="brands">
        <div>Bandai</div>
        <div>Blokees</div>
        <div>Yolopark</div>
    </div>
</section>

<!-- SHOP -->
<section id="shop">
    <h2>Featured Kits</h2>

    <div class="grid">
        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/1/16/HG-RX-78-2-Gundam-%28Beyond-Global%29-1.jpg">
            <h3>RX-78-2 Beyond Global</h3>
            <p>₱800</p>
        </div>

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/d/d2/RG-Wing-Gundam-1.jpg">
            <h3>RG Wing Gundam</h3>
            <p>₱1,500</p>
        </div>

        <div class="card">
            <img src="https://static.wikia.nocookie.net/gunplabuilders/images/9/94/MG_Barbatos_01.jpg">
            <h3>MG Barbatos</h3>
            <p>₱3,200</p>
        </div>
    </div>
</section>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Tito-Hobs | Built for Gunpla Builders</p>
</footer>

</div>
</div>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById("sidebar");
    const main = document.getElementById("main");

    sidebar.classList.toggle("closed");
    main.classList.toggle("expanded");
}
</script>

</body>
</html>
