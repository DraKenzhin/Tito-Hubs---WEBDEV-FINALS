<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Mecha Access</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<link rel="icon" type="image/png" href="ChatGPT Image May 1, 2026, 08_51_21 PM.png">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f0f1a, #000);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
}

.login-box {
    width: 320px;
    padding: 20px;
    border: 2px solid #ff2e2e;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 20px #ff2e2e;
    text-align: center;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #111;
    border: 1px solid #ff2e2e;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff2e2e;
    border: none;
    cursor: pointer;
    color: #000;
    font-weight: bold;
}

button:hover {
    background: #ff0000;
}

h2 {
    color: #ff2e2e;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>TITO-HOBS Access Card</h2>

    <input type="text" id="pilotId" placeholder="Pilot ID">
    <input type="password" id="accessCode" placeholder="Access Code">

    <select id="role">
        <option value="pilot">Pilot</option>
        <option value="admin">Admin</option>
        <option value="superadmin">Super Admin</option>
    </select>

    <button onclick="login()">DEPLOY ACCESS</button>
</div>

<script>
function login(){
    const role = document.getElementById("role").value;
    const pilotId = document.getElementById("pilotId").value;
    const accessCode = document.getElementById("accessCode").value;

    // simple validation
    if(!pilotId || !accessCode){
        alert("Missing credentials!");
        return;
    }

    // store fake session
    localStorage.setItem("role", role);
    localStorage.setItem("pilotId", pilotId);

    alert("Access Granted: " + role.toUpperCase());

    // routing system
    if(role === "pilot"){
        window.location.href = "index.html"; // store
    }
    else if(role === "admin"){
        window.location.href = "admin.html";
    }
    else if(role === "superadmin"){
        window.location.href = "superadmin.html";
    }
}
</script>

</body>
</html>
