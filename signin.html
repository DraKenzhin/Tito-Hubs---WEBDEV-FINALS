<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Mecha Access</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at top, #0f0f1a, #000);
    font-family: 'Orbitron', sans-serif;
    color: #fff;
}

.login-box {
    width: 300px;
    padding: 20px;
    border: 2px solid #ff2e2e;
    background: rgba(0,0,0,0.7);
    box-shadow: 0 0 20px #ff2e2e;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: #111;
    border: 1px solid #ff2e2e;
    color: #fff;
}

button {
    width: 100%;
    padding: 10px;
    background: #ff2e2e;
    border: none;
    cursor: pointer;
    color: #000;
    font-weight: bold;
}

button:hover {
    background: #ff0000;
}

h2 {
    color: #ff2e2e;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>TITO-HOBS Access Card</h2>

    <input type="text" placeholder="Pilot ID">
    <input type="password" placeholder="Access Code">

    <button onclick="login()">DEPLOY ACCESS</button>
</div>

<script>
function login(){
    alert("Access Granted. Welcome Pilot.");
    window.location.href = "index.html"; // back to store
}
</script>

</body>
</html>
