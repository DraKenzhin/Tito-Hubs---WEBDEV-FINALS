<script>
console.log("SUPER ADMIN CORE LOADED");

// ---------------- SECURITY ----------------
const role = localStorage.getItem("role");
const pilotId = localStorage.getItem("pilotId");

if(role !== "superadmin"){
    alert("ACCESS DENIED: SUPER ADMIN ONLY");
    window.location.href = "index.html";
}

// ---------------- UI ----------------
document.getElementById("userInfo").innerText =
`Logged in as: ${pilotId} | ROLE: ${role.toUpperCase()}`;

// ---------------- LOAD DATA ----------------
let products = JSON.parse(localStorage.getItem("products")) || [];
renderProducts();

// ---------------- BUTTON FIX ----------------
document.addEventListener("DOMContentLoaded", () => {

    document.querySelector("button[onclick='addProduct()']")
        ?.addEventListener("click", addProduct);

    document.querySelector(".store-btn")
        ?.addEventListener("click", openStore);
});

// ---------------- ADD PRODUCT ----------------
function addProduct(){

    const name = document.getElementById("name").value.trim();
    const brand = document.getElementById("brand").value;
    const grade = document.getElementById("grade").value;
    const price = Number(document.getElementById("price").value);
    const file = document.getElementById("image").files[0];

    if(!name || !price || !file){
        alert("Missing product data!");
        return;
    }

    const reader = new FileReader();

    reader.onload = function(e){

        const product = {
            id: Date.now(), // IMPORTANT UNIQUE ID
            name,
            brand,
            grade,
            price,
            image: e.target.result,
            published: false
        };

        products.push(product);
        saveAndRender();

        console.log("PRODUCT ADDED:", product);
    };

    reader.readAsDataURL(file);
}

// ---------------- SAVE ----------------
function saveAndRender(){
    localStorage.setItem("products", JSON.stringify(products));
    renderProducts();
}

// ---------------- DELETE (FIXED SAFE VERSION) ----------------
function deleteProduct(id){

    products = products.filter(p => p.id !== id);

    saveAndRender();

    console.log("DELETED PRODUCT ID:", id);
}

// ---------------- SEND TO STORE ----------------
function sendToStore(id){

    const product = products.find(p => p.id === id);
    if(product){
        product.published = true;
        saveAndRender();
        alert("Sent to Store!");
    }
}

// ---------------- OPEN STORE ----------------
function openStore(){
    window.location.href = "index.html";
}

// ---------------- RENDER ----------------
function renderProducts(){

    const list = document.getElementById("productList");
    if(!list) return;

    list.innerHTML = "";

    products.forEach(p => {

        list.innerHTML += `
        <div class="product-card">
            <img src="${p.image}">
            <h4>${p.name}</h4>
            <p>Brand: ${p.brand}</p>
            <p>Grade: ${p.grade}</p>
            <p>Price: ₱${p.price}</p>
            <p>Status: ${p.published ? "IN STORE" : "DRAFT"}</p>

            <button onclick="sendToStore(${p.id})">SEND TO STORE</button>
            <button class="delete-btn" onclick="deleteProduct(${p.id})">DELETE</button>
        </div>
        `;
    });
}
</script>
